<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- White background -->
  <rect width="512" height="512" rx="100" fill="#ffffff"/>
  <!-- 3D Triangle (tetrahedron) in blue -->
  <!-- Back face -->
  <polygon points="256,80 80,380 432,380" fill="#0d4fbf" opacity="0.6"/>
  <!-- Left face -->
  <polygon points="256,80 80,380 256,420" fill="#1677ff" opacity="0.85"/>
  <!-- Right face -->
  <polygon points="256,80 432,380 256,420" fill="#4096ff" opacity="0.7"/>
  <!-- Bottom face -->
  <polygon points="80,380 432,380 256,420" fill="#0d4fbf" opacity="0.5"/>
  <!-- Edges -->
  <line x1="256" y1="80" x2="80" y2="380" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="80" x2="432" y2="380" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
  <line x1="256" y1="80" x2="256" y2="420" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="380" x2="432" y2="380" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
  <line x1="80" y1="380" x2="256" y2="420" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
  <line x1="432" y1="380" x2="256" y2="420" stroke="#1677ff" stroke-width="3" opacity="0.6"/>
</svg>
