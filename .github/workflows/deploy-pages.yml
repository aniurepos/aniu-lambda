name: Build static export to docs/

on:
  push:
    branches: [main]
    paths:
      - "chat-app/**"
      - ".github/workflows/deploy-pages.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: chat-app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: chat-app/package-lock.json

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Build static export
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: ""
          NEXT_PUBLIC_APP_VERSION: ${{ github.ref_name }}

      - name: Copy to docs/
        run: |
          rm -rf ../docs
          cp -r out ../docs
          touch ../docs/.nojekyll

      - name: Commit and push docs/
        run: |
          cd ..
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update docs/ (static export)"
          git push
