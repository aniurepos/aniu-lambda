name: Upload DMG to Release

on:
  push:
    tags:
      - "v*"

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload DMG to Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="chat-app/src-tauri/target/release/bundle/dmg/ChatQuota.dmg"
          if [ ! -f "$DMG" ]; then
            echo "No DMG found at $DMG"
            echo "Build it locally first: cd chat-app && npx tauri build"
            echo "Then copy the DMG: cp src-tauri/target/release/bundle/dmg/*.dmg src-tauri/target/release/bundle/dmg/ChatQuota.dmg"
            exit 1
          fi
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
