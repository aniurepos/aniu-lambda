name: Upload DMG to Release

on:
  push:
    tags:
      - "v*"

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create or update release and upload DMG
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          DMG="chat-app/dist/ChatQuota.dmg"
          if [ ! -f "$DMG" ]; then
            echo "No DMG found at $DMG"
            echo "Build it locally first: make chat-tauri-build"
            exit 1
          fi
          # Create release if it doesn't exist, then upload
          gh release create "${{ github.ref_name }}" --generate-notes 2>/dev/null || true
          gh release upload "${{ github.ref_name }}" "$DMG" --clobber
