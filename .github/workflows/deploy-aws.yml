name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "sam-app/**"
      - "sam-app-integ/**"
      - "cdk/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

env:
  AWS_REGION: us-west-2

jobs:
  # ===========================================================================
  # Job 1: Build SAM Java Lambda + Run Unit Tests
  # ===========================================================================
  build-and-test:
    name: Lambda unit test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build SAM Java Lambda
        run: |
          cd sam-app/HelloWorldFunction
          chmod +x gradlew
          ./gradlew build

      - name: Upload Lambda build artifact
        uses: actions/upload-artifact@v4
        with:
          name: lambda-build
          path: sam-app/HelloWorldFunction/build/
          retention-days: 1

  # ===========================================================================
  # Job 2: Deploy to Beta (depends on build)
  # ===========================================================================
  deploy-beta:
    name: Beta infra deployment
    needs: build-and-test
    runs-on: ubuntu-latest
    environment:
      name: beta
      url: ${{ steps.get-beta-url.outputs.api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Download Lambda build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-build
          path: sam-app/HelloWorldFunction/build/

      - name: Setup SAM build output (for CDK asset reference)
        run: |
          mkdir -p sam-app/.aws-sam/build/HelloWorldFunction
          # Copy the built JAR and any dependencies to the expected SAM build path
          cp -r sam-app/HelloWorldFunction/build/libs/* sam-app/.aws-sam/build/HelloWorldFunction/
          cp -r sam-app/HelloWorldFunction/build/resources/* sam-app/.aws-sam/build/HelloWorldFunction/ 2>/dev/null || true

      - name: Install CDK dependencies
        run: npm ci
        working-directory: cdk

      - name: Build CDK (compile TypeScript)
        run: npm run build
        working-directory: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy InfraStack-Beta
        run: npx cdk deploy InfraStack-Beta --require-approval never
        working-directory: cdk

      - name: Get Beta API URL
        id: get-beta-url
        run: |
          URL=$(aws cloudformation describe-stacks --stack-name InfraStack-Beta \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"

  # ===========================================================================
  # Job 3: Integration Tests against Beta (depends on deploy-beta)
  # ===========================================================================
  integration-test:
    name: Beta integ test
    needs: deploy-beta
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Run Java integration tests (Beta)
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name InfraStack-Beta \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          API_KEY_ID=$(aws cloudformation describe-stacks --stack-name InfraStack-Beta \
            --query "Stacks[0].Outputs[?OutputKey=='ApiKeyId'].OutputValue" --output text)
          API_KEY=$(aws apigateway get-api-key --api-key "$API_KEY_ID" --include-value --query "value" --output text)
          cd sam-app-integ
          chmod +x gradlew
          ./gradlew test -Dapi.url="$API_URL" -Dapi.key="$API_KEY"

  # ===========================================================================
  # Job 4: Manual approval before Prod deployment
  # ===========================================================================
  approve-prod:
    name: Manual approval for Prod
    needs: integration-test
    runs-on: ubuntu-latest
    environment:
      name: prod
    steps:
      - name: Awaiting manual approval
        run: echo "Approved! Proceeding to Prod deployment..."

  # ===========================================================================
  # Job 5: Deploy to Prod (depends on manual approval)
  # ===========================================================================
  deploy-prod:
    name: Prod infra deployment
    needs: approve-prod
    runs-on: ubuntu-latest
    environment:
      name: prod
      url: ${{ steps.get-prod-url.outputs.api_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Download Lambda build artifact
        uses: actions/download-artifact@v4
        with:
          name: lambda-build
          path: sam-app/HelloWorldFunction/build/

      - name: Setup SAM build output (for CDK asset reference)
        run: |
          mkdir -p sam-app/.aws-sam/build/HelloWorldFunction
          cp -r sam-app/HelloWorldFunction/build/libs/* sam-app/.aws-sam/build/HelloWorldFunction/
          cp -r sam-app/HelloWorldFunction/build/resources/* sam-app/.aws-sam/build/HelloWorldFunction/ 2>/dev/null || true

      - name: Install CDK dependencies
        run: npm ci
        working-directory: cdk

      - name: Build CDK (compile TypeScript)
        run: npm run build
        working-directory: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Deploy InfraStack-Prod
        run: npx cdk deploy InfraStack-Prod --require-approval never
        working-directory: cdk

      - name: Get Prod API URL
        id: get-prod-url
        run: |
          URL=$(aws cloudformation describe-stacks --stack-name InfraStack-Prod \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          echo "api_url=$URL" >> "$GITHUB_OUTPUT"
