name: Deploy to AWS

on:
  push:
    branches: [main]
    paths:
      - "sam-app/**"
      - "sam-app-integ/**"
      - "cdk/**"
      - ".github/workflows/deploy-aws.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ---- SAM Java Lambda: Build + Unit Tests ----
      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Build SAM Java Lambda
        run: |
          cd sam-app/HelloWorldFunction
          chmod +x gradlew
          ./gradlew build

      # ---- CDK: Deploy Beta ----
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: cdk/package-lock.json

      - name: Install CDK dependencies
        run: npm ci
        working-directory: cdk

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Deploy InfraStack-Beta
        run: npx cdk deploy InfraStack-Beta --require-approval never
        working-directory: cdk

      # ---- Integration Tests against Beta ----
      - name: Run Java integration tests (Beta)
        run: |
          API_URL=$(aws cloudformation describe-stacks --stack-name InfraStack-Beta --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" --output text)
          API_KEY_ID=$(aws cloudformation describe-stacks --stack-name InfraStack-Beta --query "Stacks[0].Outputs[?OutputKey=='ApiKeyId'].OutputValue" --output text)
          API_KEY=$(aws apigateway get-api-key --api-key "$API_KEY_ID" --include-value --query "value" --output text)
          cd sam-app-integ
          chmod +x gradlew
          ./gradlew test -Dapi.url="$API_URL" -Dapi.key="$API_KEY"

      # ---- CDK: Deploy Prod (only if integ tests pass) ----
      - name: Deploy InfraStack-Prod
        run: npx cdk deploy InfraStack-Prod --require-approval never
        working-directory: cdk
